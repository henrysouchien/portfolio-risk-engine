# Cash Mapping Configuration
#
# Canonical source for global cash proxy mappings used by:
# - SecurityTypeService Tier 1 cash proxy detection
# - Portfolio cash normalization
# - Factor intelligence cash proxy loading
#
# The YAML schema is:
# - proxy_by_currency: ISO currency -> ETF proxy ticker
# - alias_to_currency: broker cash alias -> ISO currency
#
# Current canonical examples:
# - USD -> SGOV
# - EUR -> IBGE.L
# - GBP -> ERNS.L

proxy_by_currency:        # ① Which ETF to use for each ISO currency
  USD: SGOV               #iShares 0-3 Month Treasury Bond ETF
  EUR: IBGE.L             #iShares € Govt Bond 0-1yr UCITS ETF
  GBP: ERNS.L             #iShares £ Ultrashort Bond UCITS ETFF  

cash_equivalent_tickers:
  - SGOV
  - SHY
  - BIL
  - SHV
  - MINT
  - JPST
  - NEAR
  - ICSH
  - SCHO
  - VGSH
  - GBIL
  - TFLO
  - USFR
  - IBGE.L
  - ERNS.L

alias_to_currency:        # ② Any broker cash tickers → currency code
  CUR:USD: USD            # Interactive Brokers
  USD CASH: USD
  USD:CASH: USD           # Schwab direct provider format
  CASH: USD               # generic fallback
  BASE_CURRENCY: USD
  CUR:EUR: EUR            # example for multi-ccy accounts
